<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../../assets/food-store/favicon_bodegon.png">
    <title>Food Store - Catálogo</title>
</head>

<body class="store-page">
    <div class="store-shell">
        <header class="store-header">
            <div class="top-bar">
                <div class="header-container">
                    <img id="storeLogo" src="../../../assets/food-store/logo_bodegon.png" alt="Logo de Food Store" class="logo" decoding="async">
                    <h1 class="title">Food Store</h1>
                </div>
                <section class="session-box" aria-label="Usuario logueado">
                    <span id="loggedUserName"></span>
                    <button id="logoutButton" type="button">Logout</button>
                </section>
            </div>
            <nav id="storeNavigation" class="store-navigation" aria-label="Navegación principal"></nav>
        </header>
        <hr>
        <main class="client-layout client-home-layout">
            <aside class="client-sidebar">
                <section class="client-filter-section">
                    <h2 class="client-section-title">Categorías</h2>
                    <p class="client-filter-hint">Filtra por categoría</p>
                    <div class="client-filter-box">
                        <button id="showAllProductsButton" type="button" class="button-secondary category-filter active">Todos los productos</button>
                        <ul id="lista-categorias"></ul>
                    </div>
                </section>
            </aside>
            <section class="client-products client-main-panel">
                <section class="client-toolbar" aria-label="Filtros de productos">
                    <form id="searchForm" class="client-filter-box search-form">
                        <label for="buscarProducto">Buscar productos...</label>
                        <input id="buscarProducto" name="buscarProducto" placeholder="Buscar productos...">
                        <label for="sortProducts">Ordenar por</label>
                        <select id="sortProducts" name="sortProducts">
                            <option value="name-asc">Nombre A-Z (predeterminado)</option>
                            <option value="name-desc">Nombre Z-A</option>
                            <option value="price-asc">Precio ascendente</option>
                            <option value="price-desc">Precio descendente</option>
                        </select>
                    </form>
                </section>
                <header class="client-products-header">
                    <h2 id="productsTitle" class="client-section-title">Todos los Productos</h2>
                    <p id="productsCount" class="client-products-count">0 productos</p>
                </header>
                <p id="searchMessage" class="empty-message" role="status" aria-live="polite"></p>
                <section id="contenedor-productos"></section>
            </section>
        </main>
        <hr>
        <footer class="store-footer">
            <p>&copy; 2026 Food Store. Todos los derechos reservados</p>
            <p>Contacto: <a href="mailto:info@foodstore.com">info@foodstore.com</a></p>
        </footer>
    </div>
    <script type="module" src="./home.ts"></script>
</body>

</html>
