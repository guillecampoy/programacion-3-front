<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../../assets/food-store/favicon_bodegon.png">
    <title>Food Store - Catálogo</title>
</head>

<body>
    <header>
        <div class="top-bar">
            <div class="header-container">
                <img id="storeLogo" alt="Logo de Food Store" class="logo">
                <h1 class="title">Food Store</h1>
            </div>
            <section class="session-box" aria-label="Usuario logueado">
                <span id="loggedUserName"></span>
                <button id="logoutButton" type="button">Logout</button>
            </section>
        </div>
        <nav>
            <a href="#">Inicio</a> |
            <a href="../../client/orders/orders.html">Mis pedidos</a> |
            <a href="../cart/cart.html">Carrito(<span id="cartQuantity">0</span>)</a>
        </nav>
    </header>
    <hr>
    <main class="client-layout">
        <aside class="client-sidebar">
            <section class="client-filter-section">
                <h2 class="client-section-title">Categorías</h2>
                <div class="client-filter-box">
                    <button id="showAllProductsButton" type="button" class="button-secondary category-filter active">Todas</button>
                    <ul id="lista-categorias"></ul>
                </div>
            </section>
            <section class="client-filter-section">
                <h2 class="client-section-title">Buscar producto</h2>
                <form id="searchForm" class="client-filter-box search-form">
                    <label for="buscarProducto">Producto</label>
                    <input id="buscarProducto" name="buscarProducto" placeholder="Ej: Hamburguesa">
                    <label for="sortProducts">Ordenar</label>
                    <select id="sortProducts" name="sortProducts">
                        <option value="name-asc">Nombre A-Z</option>
                        <option value="name-desc">Nombre Z-A</option>
                        <option value="price-asc">Precio ascendente</option>
                        <option value="price-desc">Precio descendente</option>
                    </select>
                    <button type="submit">Buscar</button>
                </form>
            </section>
        </aside>
        <section class="client-products">
            <h2 id="productsTitle" class="client-section-title">Productos</h2>
            <p id="searchMessage" class="empty-message"></p>
            <section id="contenedor-productos"></section>
        </section>
    </main>
    <div id="productDetailModal" class="modal-overlay" hidden>
        <article class="modal-content" role="dialog" aria-modal="true" aria-labelledby="productDetailTitle">
            <button id="closeProductDetailButton" type="button" class="modal-close" aria-label="Cerrar detalle">Cerrar</button>
            <img id="productDetailImage" class="modal-product-image" alt="">
            <h2 id="productDetailTitle" class="modal-title"></h2>
            <p id="productDetailCategory" class="modal-category"></p>
            <p id="productDetailDescription" class="modal-description"></p>
            <p id="productDetailPrice" class="product-price"></p>
        </article>
    </div>
    <hr>
    <footer>
        <p>&copy; 2026 Food Store. Todos los derechos reservados</p>
        <p>Contacto: <a href="mailto:info@foodstore.com">info@foodstore.com</a></p>
    </footer>
    <script type="module" src="./home.ts"></script>
</body>

</html>
