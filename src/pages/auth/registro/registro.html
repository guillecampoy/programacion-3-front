<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <title>Document</title>
</head>

<body>
    <h1>Registro</h1>

    <form id="form">
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" inputmode="email" maxlength="254" required placeholder="example@example.com">
        </div>
        <div>
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" maxlength="64" pattern="(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@._$!%*?&amp;\-]+" title="La contraseña debe tener entre 8 y 64 caracteres, incluir letras y números, y no contener espacios." required placeholder="********">
            <small>Usá entre 8 y 64 caracteres, con letras y números.</small>
        </div>
        <p id="message"></p>
        <button type="submit">Registrarse</button>
    </form>

    <a href="../login/login.html">Ya tengo cuenta</a>

    <script type="module" src="./registro.ts"></script>
</body>

</html>
