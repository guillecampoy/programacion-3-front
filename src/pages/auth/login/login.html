<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../../assets/food-store/favicon_bodegon.png">
    <title>Food Store - Login</title>
</head>

<body class="auth-page">
    <main class="auth-stage">
        <section class="auth-card" aria-labelledby="auth-title">
            <p class="auth-brand">Food Store</p>
            <h2 id="auth-title" class="auth-heading">Iniciar Sesión</h2>

            <form id="form" class="auth-form">
                <div>
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        autocomplete="email"
                        inputmode="email"
                        maxlength="254"
                        required
                        placeholder="ejemplo@correo.com"
                    >
                </div>
                <div>
                    <label for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        minlength="8"
                        maxlength="20"
                        pattern="(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@._$!%*?&amp;\-]+"
                        title="La contraseña debe tener entre 8 y 20 caracteres, incluir letras y números, y no contener espacios."
                        required
                        placeholder="Ingresa tu contraseña"
                    >
                </div>
                <p id="message" class="form-message" aria-live="polite"></p>
                <button type="submit">Ingresar</button>
            </form>

            <a class="auth-link" href="../registro/registro.html">¿No tienes cuenta? Regístrate</a>

            <section class="auth-credentials" aria-label="Cuentas de prueba">
                <p class="auth-credentials-title">Cuentas de prueba:</p>
                <p>Admin: admin@test.com / Admin1234</p>
                <p>Cliente: client@test.com / Client1234</p>
            </section>
        </section>
    </main>

    <script type="module" src="./login.ts"></script>
</body>

</html>
