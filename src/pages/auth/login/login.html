<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../../assets/food-store/favicon_bodegon.png">
    <title>Food Store - Login</title>
</head>

<body class="auth-page">
    <main class="auth-card">
        <h1 class="title">Login</h1>

        <form id="form" class="auth-form">

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="email" inputmode="email" maxlength="254" required placeholder="example@example.com">
            </div>
            <div>
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" autocomplete="current-password" minlength="8" maxlength="20" pattern="(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@._$!%*?&amp;\-]+" title="La contraseña debe tener entre 8 y 20 caracteres, incluir letras y números, y no contener espacios." required placeholder="********">
            </div>
            <p id="message"></p>
            <button type="submit">Ingresar</button>

        </form>
        <a href="../registro/registro.html">Crear cuenta</a>
    </main>

    <script type="module" src="./login.ts"></script>
</body>

</html>
